  valence:
    enabled: true               # EPI-015: ON (2026-04-28) — ValenceIntegrator attivo
    sensitivity: 1.50           # scala il raw_valence prima di tanh
    noise_floor: 0.05           # arousal minimo (sistema sempre "vivo")
    alpha_ema: 0.15             # smoothing EMA della valence
    # Pesi segnali (devono sommare a 1.0):
    weights:
      viability:       0.35     # drive più importante (sopravvivenza)
      curiosity:       0.20     # novelty/reward
      alignment:       0.20     # purpose/mission
      coherence:       0.10     # self-consistency
      energy:          0.10     # stato metabolico
      plasticity_gain: 0.05     # progresso apprendimento
  temporal:
    enabled: true               # EPI-014: ON (2026-04-28) — CircadianOscillator attivo
    use_system_clock: true      # usa ora reale di sistema
    circadian_amplitude: 0.70   # ampiezza modulazione circadiana [0.0–1.0]
    ultradian_amplitude: 0.20   # ampiezza ritmo ultradiano [0.0–0.50]
    ultradian_rest_threshold: 0.15  # soglia pausa ultradiana
    # Fasi circadiane: MORNING_PEAK (07-12), AFTERNOON (12-17),
    #                  EVENING (17-21), NIGHT_VALLEY (21-07)
    # Ultradian period: 5400s (90 min, ispirato a cicli REM/NREM)
  glial:
    enabled: true               # EPI-014: ON (2026-04-28) — GlialSupport attivo
    plasticity_boost_max: 0.30  # boost massimo [0.0–1.0] da calcium wave
    calcium_threshold: 0.40     # soglia Ca²⁺ per attivare plasticity boost
    cleanup_awake_rate: 0.05    # clearance glinfatica in veglia (5%)
    cleanup_sleep_rate: 0.40    # clearance glinfatica in deep_sleep (40%, 8× più alta)
    metabolic_regen_rate: 0.10  # velocità rigenerazione metabolic_reserve
    # AstrocyteNetwork: 11 nodi (10 comparti Cortex + energy_monitor)
    # Topologia: 14 connessioni 