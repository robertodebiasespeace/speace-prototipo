# --- Mesh CNM (M4) ---
mesh:
  enabled: false                # EPI-004: OFF by default — abilitare con proposta SafeProactive
  smfoi_bridge_step3bis: false  # step3bis opt-in: attivare dopo staging M4.16 verificato
  heartbeat_interval_s: 60      # intervallo tick daemon mesh
  telemetry_path: "safeproactive/state/mesh_state.jsonl"
  max_proposals_per_tick: 5
  harmony_alert_threshold: 0.65
  needs_baseline_neurons: 10

# --- Cognitive Autonomy M5 ---
cognitive_autonomy:
  homeostasis:
    enabled: true               # EPI-005: ON (2026-04-26) — HomeostaticController attivo
    heartbeat_s: 30.0
    k_restore: 0.10             # forza ripristino verso setpoint
    k_input: 0.30               # peso receptor reading
    tolerance: 0.15
    h_setpoint_static:
      energy:    0.75
      safety:    0.95
      curiosity: 0.50
      coherence: 0.70
      alignment: 0.80
  motivation:
    enabled: true               # EPI-005: ON (2026-04-26) — ValueField V_internal attivo
  memory:
    enabled: true               # EPI-006: ON (2026-04-27) — AutobiographicalMemory SQLite attivo
  attention:
    enabled: true               # EPI-006: ON (2026-04-27) — Attention UCB1 RL-driven attivo
  plasticity:
    enabled: true               # EPI-006: ON (2026-04-27) — Plasticity Hebbian + pruning attivi
  constraints:
    enabled: true               # EPI-006: ON
  executive:
    enabled: true               # EPI-008: ON (2026-04-27) — DriveExecutive M7.0 attivo
    viability_repair_threshold: 0.4
    viability_conserve_threshold: 0.6
    curiosity_explore_threshold: 0.7
    coherence_memory_threshold: 0.4
    energy_shallow_threshold: 0.3
    energy_deep_threshold: 0.7
    alignment_gate_threshold: 0.5
    phi_parallel_threshold: 0.7
  swarm:
    enabled: true               # EPI-010: ON (2026-04-27) — Swarm Agentic Layer 10° comparto
    model: "gemma3:4b"
    max_subtasks: 4
    critic_strict: false
  predictive:
    enabled: true               # EPI-012: ON (2026-04-28) — PredictiveCoding (Friston) attivo
    alpha: 0.15                 # peso osservazione corrente nell'EMA (basso=stabile, alto=reattivo)
    beta: 0.10                  # peso del trend stimato
    history_window: 30          # finestra storica per calcolo varianza
    # Soglie errore (AWAKE): suppressed < 0.03 < low < 0.08 < medium < 0.15 < high < 0.30 < critical
    threshold_suppressed: 0.03
    threshold_low: 0.08
    threshold_medium: 0.15
    threshold_high: 0.30
    # Obiettivo: suppression_rate > 0.60 in stato stabile (come corteccia biologica)
    target_suppression_rate: 0.60
  immune:
    enabled: true               # EPI-012: ON (2026-04-28) — CognitiveImmune attivo
    strict_mode: false          # false = preferisce missed detection a false alarm storm
    threat_patterns_builtin: 6  # TP-001→TP-006 pre-caricati
    immune_memory_max: 10000    # max entry cache ImmuneMemory
    immune_memory_ttl_h: 24     # TTL cache (ore)
    # Soglie severity (1.0 = massima pericolosità)
    trusted_severity_threshold: 0.50   # sorgenti TRUSTED: blocca solo se severity > 0.50
    default_severity_threshold: 0.70   # sorgenti UNKNOWN: blocca se severity > 0.70
    # Sorgenti interne SPEACE (sempre TRUSTED, non subiscono screening completo):
    internal_trusted_sources:
      - smfoi_kernel
      - drive_executive
      - homeostatic_controller
      - swarm_orchestrator
      - world_model_cortex
      - autobiographical_memory
      - energy_budget
      - predictive_processor
      - safeproactive
  homeostatic_plasticity:
    enabled: true               # EPI-015: ON (2026-04-28) — HomeostaticPlasticityRegulator attivo
    target_activity: 0.55       # firing rate target [0.0–1.0]
    high_activity_thresh: 0.15  # > target+thresh → SCALE_DOWN
    low_activity_thresh: 0.20   # < target-thresh → SCALE_UP
    history_window: 20          # finestra mobile per moving average
    scale_factor_max: 1.30      # amplificazione massima (+30%)
    scale_factor_min: 0.70      # attenuazione massima (-30%)
    scaling_speed: 0.02         # lento (biologico: ore/giorni)
    min_samples_to_act: 5       # campioni minimi prima di agire
  criticality:
    enabled: true               # EPI-016: ON (2026-04-29) — CriticalityController attivo
    order_threshold: 0.75       # soglia superiore ordine (> → OVER-ORDERED)
    chaos_threshold: 0.35       # soglia inferiore ordine (< → OVER-CHAOTIC)
    coherence_weight: 0.60      # peso coherence nel calcolo order_score
    novelty_weight: 0.40        # peso (1-novelty) nel calcolo order_score
    # Suggerimenti modulazione
    temperature_boost: 0.15     # Δtemperatura in OVER-ORDERED (boost divergenza)
    novelty_boost: 0.20         # Δexploration_bonus in OVER-ORDERED
    temperature_cut: -0.15      # Δtemperatura in OVER-CHAOTIC (boost struttura)
    coherence_boost: 0.20       # Δcoherence_boost in OVER-CHAOTIC
    history_window: 20          # finestra rolling per mean_order_score
    alpha_ema: 0.20             # peso EMA order_score
    # mutation_gate_open: True SOLO nella zona CRITICAL — fuori dalla zona blocca mutazioni
    # Target zone: 0.35 ≤ order_score ≤ 0.75 (metastabilità ottimale)
  behavioral_predictor:
    enabled: true               # EPI-016: ON (2026-04-29) — BehavioralPredictor attivo
    memory_size: 20             # rolling history window (stati recenti)
    min_history_for_pred: 3     # osservazioni minime per predizione affidabile
    confidence_history_boost: 0.10  # boost confidenza se storia conferma pattern
    # Classi d'azione: recall, explore, repair, plan, general
    # Regole drive: viability<0.4→repair, curiosity>0.7+input→explore
  semantic_search:
    enabled: true               # EPI-016: ON (2026-04-29) — SemanticSearch attivo
    ollama_model: "nomic-embed-text"  # modello Ollama per embeddings reali
    ollama_timeout_s: 5.0       # timeout connessione Ollama
    embedding_dim: 768          # dimensione vettore (nomic-embed-text default)
    fallback_deterministic: true  # fallback hash-based se Ollama non disponibile
    min_score: 0.0              # soglia minima score per risultati
    # Wiring: AutobiographicalMemory.search_semantic(query, top_k) → SemanticSearch

# ── EPI-017 ──────────────────────────────────────────────────────────────────
evolution:
  code_mutation_lab:
    enabled: true               # EPI-017: ON (2026-04-29) — CodeMutationLab attivo
    backup_dir: ".speace_backups"  # cartella backup timestamped
    max_history: 50             # massimo eventi in mutation_history
    require_approval: true      # SEMPRE richiede approvazione SafeProactive
    auto_approve_risk: "NONE"   # nessuna auto-approvazione — tutto human-in-the-loop
    # MutationType disponibili:
    #   ADD_AUDIT_NOTE (LOW) — aggiunge commento evolutivo
    #   ADD_LOGGING (LOW) — aggiunge import logging + log.debug
    #   ADD_MODULE_DOCSTRING (LOW) — aggiunge docstring modulo
    #   ADD_TYPE_HINTS (MEDIUM) — aggiunge # type: ignore
    #   IMPROVE_ERROR_HANDLING (MEDIUM) — bare except → except Exception
    # Pipeline: backup → ast_validate(original) → mutate → ast_validate(mutated)
    #         → write → post_write_check → rollback automatico se fallisce

  genetic_algorithm:            # EPI-018: ON (2026-04-29) — EvolutionaryAlgorithm GA
    enabled: true
    population_size: 10         # individui per generazione
    mutation_rate: 0.20         # ±20% proporzionale per gene
    crossover_rate: 0.70        # probabilità crossover vs cloning
    elite_fraction: 0.50        # top 50% sopravvive come élite
    convergence_patience: 5     # generazioni senza miglioramento → stop
    fitness_weights:            # DEFAULT_FITNESS_WEIGHTS
      speace_alignment_score: 0.35
      task_success_rate: 0.25
      system_stability: 0.20
      resource_efficiency: 0.15
      ethical_compliance: 0.05
    safeproactive_gate: true    # propose_best() → PENDING_APPROVAL prima di applicare

  # ── EPI-019 ────────────────────────────────────────────────────────────────
  neural_parliament:            # EPI-019: ON (2026-04-29) — NeuralParliament governance
    enabled: true
    consensus_threshold_low: 0.80    # auto-approve LOW risk se consensus >= 80%
    consensus_threshold_medium: 0.90 # MEDIUM mai auto-approvato (sempre escalate)
    min_quorum: 3                    # delegate minimi per votazione valida
    delegates:
      - name: "SafetyGuard"
        role: "safety"
        weight: 0.30
      - name: "EvolutionVoice"
        role: "evolution"
        weight: 0.25
      - name: "Critic"
        role: "critic"
        weight: 0.20
      - name: "Executor"
        role: "executor"
        weight: 0.15
      - name: "Ethicist"
        role: "ethics"
        weight: 0.10
    # Regole di escalation:
    #   MEDIUM / HIGH → sempre ESCALATED (nessuna delibera)
    #   LOW + consensus < 0.80 → ESCALATED (human review SafeProactive)
    #   LOW + consensus >= 0.80 → APPROVED (autonomo)

  # ── EPI-020 ────────────────────────────────────────────────────────────────
  kinetic_flow:               # EPI-020: ON (2026-04-29) — Homeodyna+Kinetica attivo
    enabled: true
    relaxation_tau: 5.0       # costante rilassamento omeostatico (secondi simulati)
    diffusion_coeff: 0.25     # coefficiente diffusione inter-lobo
    damping: 0.05             # smorzamento inerzia (anti-oscillazione)
    high_kinetic_threshold: 0.15  # soglia eccitazione alta (→ attiva EnergyBudget)
    history_max: 50           # rolling history tick
    # Lobi: Frontale(0.82), Temporale(0.78), Parietale(0.71), Occipitale(0.65), Cingulate(0.85)
    # total_kinetic → energy_budget_feed(EnergyBudget) ogni ciclo cognitivo

