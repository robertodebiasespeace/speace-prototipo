    enabled: true               # EPI-017: ON (2026-04-29) — PersistentIdentity attiva
    identity_file: "data/identity.json"  # storage JSON multi-sessione
    achievement_threshold: 0.85  # emergence_score minimo per achievement automatico
    history_max: 50             # massimo punti in emergence_history (rolling)
    narrative_max: 100          # massimo voci nel narrative log (rolling)
    # Wiring SMFOI Step 1 (Self-Location):
    #   identity.tick(emergence_score, metrics) — aggiornamento ad ogni ciclo
    # Core values (immutabili): vedi DEFAULT_CORE_VALUES in persistent_identity.py
